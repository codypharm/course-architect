name: CI

on:
  pull_request:
    branches: [main]

jobs:
  frontend-check:
    name: Frontend type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  backend-check:
    name: Backend syntax + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Syntax check
        run: uv run python -c "import api.main; import celery_app.worker"

      - name: Run tests
        # Skip gracefully if no tests exist yet
        run: uv run pytest tests/ -x -q || echo "No tests found — skipping"

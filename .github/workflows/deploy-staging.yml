name: Deploy Staging

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT: ai-course-architect
  ENV: staging
  TF_DIR: infra/terraform/envs/staging

jobs:
  # ── 1. Build + push Docker image to ECR ───────────────────────────────────────
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_url: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT }}:staging-latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT }}:staging-latest
          cache-to: type=inline

  # ── 2. Terraform apply + ECS deploy ──────────────────────────────────────────
  deploy-backend:
    name: Deploy backend (Terraform + ECS)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_image_tag: ${{ needs.build-and-push.outputs.image_tag }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform apply -auto-approve -input=false

      - name: Force new ECS deployments
        run: |
          CLUSTER="${{ env.PROJECT }}-${{ env.ENV }}"
          for SERVICE in api worker beat flower; do
            echo "Updating $SERVICE..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$SERVICE" \
              --force-new-deployment \
              --query 'service.serviceName' \
              --output text
          done

      - name: Wait for API service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.PROJECT }}-${{ env.ENV }}" \
            --services api
          echo "API service is stable."

  # ── 3. Build + deploy React frontend ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-backend]
    environment: staging
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform (to read outputs)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Read Terraform outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false -reconfigure
          echo "alb_dns=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          echo "cf_domain=$(terraform output -raw cloudfront_domain)" >> "$GITHUB_OUTPUT"
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "bucket=$(terraform output -raw frontend_bucket)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL: "http://${{ steps.tf.outputs.alb_dns }}"
        run: npm run build

      - name: Sync to S3
        run: |
          aws s3 sync dist/ "s3://${{ steps.tf.outputs.bucket }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html must not be cached — browsers check it on every load
          aws s3 cp dist/index.html "s3://${{ steps.tf.outputs.bucket }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cf_id }}" \
            --paths "/*"
          echo "Frontend deployed to https://${{ steps.tf.outputs.cf_domain }}"
